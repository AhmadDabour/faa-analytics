# $ docker compose up to start all services, down to stop all running services, logs to monitor output of running containers, 
#ps to list all services along with current status
services:
  web:
    depends_on:
      db:
        condition: service_healthy
    build: .
    ports:
        - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
      - REDIS_HOST=redis
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=faa

  redis:
    image: redis:7
volumes:
  postgres_data: